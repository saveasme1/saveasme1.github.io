<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>HERITAGE Try-On MVP</title>
  <base href="./" />
  <link rel="stylesheet" href="./public/styles.css" />
</head>
<body>
  <header class="top">
    <p class="eyebrow">EXPERIMENTAL MVP</p>
    <h1>HERITAGE Try-On</h1>
    <p class="sub">포트폴리오 주얼리를 손·귀·목에 올려보는 무료 오픈소스 프로토타입</p>
    <p class="warn">이 페이지는 hand-made.kr 와 분리된 테스트 전용입니다.</p>
  </header>

  <nav class="steps" id="stepNav" aria-label="진행 단계">
    <button type="button" data-step="1" class="is-on">1. 제품</button>
    <button type="button" data-step="2">2. 사진</button>
    <button type="button" data-step="3">3. 착용</button>
    <button type="button" data-step="4">4. 결과</button>
  </nav>

  <main>
    <section id="step1" class="panel is-on">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="제목·카테고리 검색" />
        <select id="categoryFilter">
          <option value="">전체 카테고리</option>
        </select>
        <select id="typeHint">
          <option value="auto">종류 자동(CLIP)</option>
          <option value="ring">반지</option>
          <option value="earring">귀걸이</option>
          <option value="necklace">목걸이</option>
        </select>
      </div>
      <p id="portfolioStatus" class="status">포트폴리오 불러오는 중…</p>
      <div id="portfolioGrid" class="grid"></div>
      <div class="actions">
        <button type="button" id="toStep2" class="primary" disabled>선택한 제품으로 계속</button>
      </div>
    </section>

    <section id="step2" class="panel" hidden>
      <div class="card-row">
        <div class="card">
          <h2>카메라</h2>
          <video id="camVideo" playsinline autoplay muted></video>
          <canvas id="camCanvas" hidden></canvas>
          <div class="actions">
            <button type="button" id="startCam">카메라 시작</button>
            <button type="button" id="snapCam" class="primary" disabled>촬영</button>
            <button type="button" id="stopCam">중지</button>
          </div>
        </div>
        <div class="card">
          <h2>이미지 업로드</h2>
          <input id="fileInput" type="file" accept="image/*" capture="environment" />
          <p class="hint">손 / 귀 / 목이 잘 보이게 찍어 주세요.</p>
          <img id="bodyPreview" alt="선택한 바디 사진 미리보기" hidden />
        </div>
      </div>
      <div class="actions">
        <button type="button" id="back1">이전</button>
        <button type="button" id="toStep3" class="primary" disabled>랜드마크 검출로 계속</button>
      </div>
    </section>

    <section id="step3" class="panel" hidden>
      <p id="detectStatus" class="status">준비 중…</p>
      <div class="preview-wrap">
        <canvas id="detectCanvas"></canvas>
      </div>
      <div class="actions">
        <button type="button" id="back2">이전</button>
        <button type="button" id="runTryOn" class="primary" disabled>가상 착용 생성</button>
      </div>
    </section>

    <section id="step4" class="panel" hidden>
      <div class="before-after">
        <figure>
          <figcaption>Before</figcaption>
          <canvas id="beforeCanvas"></canvas>
        </figure>
        <figure>
          <figcaption>After</figcaption>
          <canvas id="afterCanvas"></canvas>
        </figure>
      </div>
      <p id="resultStatus" class="status"></p>
      <div class="actions">
        <button type="button" id="downloadBtn" class="primary">결과 다운로드</button>
        <button type="button" id="retryBtn">다시 시도</button>
        <button type="button" id="restartBtn">처음부터</button>
      </div>
    </section>
  </main>

  <footer class="foot">
    <small>MediaPipe · OpenCV.js · Transformers.js(CLIP) · ONNX(SAM/배경제거) · 클라이언트 전용</small>
  </footer>

  <script src="https://docs.opencv.org/4.x/opencv.js" async></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
