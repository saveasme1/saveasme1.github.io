<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="guide-build" content="20260723-title-heritage">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="헤리티지 주문제작 전문 공방 · 카카오톡 1:1 맞춤 상담">
  <meta name="application-name" content="HERITAGE">
  <meta name="apple-mobile-web-app-title" content="HERITAGE">
  <title>HERITAGE</title>
<style>
    :root{
      --kakao:#fee500;
      --glow:#ffb020;
      --ink:#171719;
      --muted:#777;
      --line:#ececee;
      --phone:#1d1d1f;
      --tip:#1e3a5f;
      --ease:cubic-bezier(.22,1,.36,1);
      --soft:cubic-bezier(.4,0,.2,1);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#fff}
    body{
      min-height:100vh;min-height:100dvh;
      padding:max(28px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right))
              max(38px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));
      color:var(--ink);
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;
      word-break:keep-all;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    }

    .page{width:min(100%,980px);margin:0 auto;text-align:center}

    .reveal{opacity:0;transform:translateY(16px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
    .reveal.on{opacity:1;transform:none}
    .reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}.reveal.d3{transition-delay:.24s}

    .brand{margin:0;font-size:13px;font-weight:700;letter-spacing:.22em;color:#8d847c}
    .hero-title{margin:12px 0 0;font-size:clamp(24px,4.4vw,36px);line-height:1.35;letter-spacing:-.045em}
    .divider{width:34px;height:1px;background:#cfc8c1;margin:22px auto 25px}
    .lead{margin:0;font-size:clamp(15px,2vw,18px);line-height:1.85;color:#56514d;letter-spacing:-.025em}
    .lead strong{color:#181818}
    .kakao-box{margin-top:25px}
    .kakao-label{font-size:12px;font-weight:800;letter-spacing:.15em;color:#999}
    .kakao-id{
      position:relative;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;
      min-width:180px;margin-top:8px;padding:13px 30px;border-radius:10px;
      background:var(--kakao);font-size:23px;font-weight:900;letter-spacing:.06em;
      box-shadow:0 10px 28px rgba(254,229,0,.28)
    }

    .guide{margin-top:clamp(54px,8vw,82px);padding-top:clamp(42px,6vw,60px);border-top:1px solid var(--line);position:relative}
    .guide h2{margin:0;font-size:clamp(23px,4vw,32px);letter-spacing:-.045em}
    .guide-sub{margin:9px 0 0;font-size:14px;color:#777}

    .global-meter{
      width:min(100%,420px);height:4px;margin:22px auto 0;border-radius:99px;background:#efefef;overflow:hidden
    }
    .global-meter > i{
      display:block;height:100%;width:0;border-radius:inherit;
      background:linear-gradient(90deg,#fee500,#ffb020)
    }

    .guide-tabs{display:none}
    .guide-tabs button{
      width:42px;height:42px;border-radius:50%;border:1px solid #e6e6e8;
      background:#fff;color:#666;font-size:15px;font-weight:900;cursor:pointer;
      font-family:inherit;-webkit-tap-highlight-color:transparent
    }
    .guide-tabs button.is-active{
      background:#1b1b1d;border-color:#1b1b1d;color:#fff
    }

    .steps{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));
      gap:28px;margin-top:34px;align-items:start
    }

    .step{
      min-width:0;padding:10px 6px 6px;border-radius:22px;border:1px solid transparent;
      cursor:pointer;transition:opacity .25s,background .25s;
      -webkit-tap-highlight-color:transparent
    }
    .step:hover{background:#fafafa}
    .step.is-dim{opacity:.45}
    .step.is-active{opacity:1;background:#fafafa}

    .step-no{
      display:grid;place-items:center;width:29px;height:29px;margin:0 auto 10px;
      border-radius:50%;background:#ececee;color:#666;font-size:13px;font-weight:900
    }
    .step.is-active .step-no{background:#1b1b1d;color:#fff}

    .phone-stage{position:relative;width:min(100%,245px);margin:0 auto;overflow:visible}
    .phone-frame{position:relative;width:100%;aspect-ratio:9/18.5;contain:layout paint}
    .camera{position:absolute;inset:0}
    .phone{
      position:relative;width:100%;height:100%;padding:10px;border-radius:27px;background:var(--phone);
      box-shadow:0 18px 34px rgba(0,0,0,.12)
    }
    .screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:19px;background:#fff;text-align:left;z-index:1}
    .head-actions,.add-icon,.add-item{overflow:visible}

    /* 타깃 아이콘에만 붙는 노란 원 1개 */
    [data-target]{position:relative}
    .hit{
      position:relative;display:grid;place-items:center;
      width:28px;height:28px;margin:0 auto;line-height:0
    }
    .hit.person{width:22px;height:22px}
    .aim{
      display:block;position:absolute;left:50%;top:50%;width:var(--aim,36px);height:var(--aim,36px);
      margin:calc(var(--aim,36px) / -2) 0 0 calc(var(--aim,36px) / -2);
      border:2.5px solid var(--glow);border-radius:50%;
      pointer-events:none;opacity:0;z-index:8;box-sizing:border-box;
      box-shadow:0 0 0 3px rgba(255,176,32,.16)
    }
    .aim.on{opacity:1}

    .fx{position:absolute;inset:10px;z-index:5;border-radius:19px;pointer-events:none;overflow:visible;opacity:0}
    .step.is-active .fx{opacity:1}

    .veil{
      position:absolute;inset:0;border-radius:19px;opacity:0;
      background:radial-gradient(circle at var(--vx,50%) var(--vy,20%),
        transparent 0,transparent var(--hole,36px),rgba(10,12,18,.5) calc(var(--hole,36px) + 24px))
    }
    .veil.on{opacity:1}

    .fake-input.lit{
      position:relative;z-index:6;
      background:#fff4b8;border-bottom-color:#e6b800!important;
      box-shadow:0 0 0 3px #fee500,0 0 0 6px rgba(254,229,0,.28);
      border-radius:8px;padding-left:6px;padding-right:6px
    }
    .confirm.lit{
      position:relative;z-index:6;
      color:#1a73e8!important;background:#fee500;
      box-shadow:0 0 0 3px rgba(254,229,0,.45)
    }

    .step-text{
      margin:14px 0 0;font-size:15px;line-height:1.55;font-weight:800;letter-spacing:-.025em
    }
    .step.is-dim .step-text{color:#999;font-weight:700}
    .step.is-active .step-text{color:#171719}

    .step-meter{
      height:3px;margin:10px 4px 0;border-radius:99px;background:#efefef;overflow:hidden;opacity:0
    }
    .step.is-active .step-meter{opacity:1}
    .step-meter > i{
      display:block;height:100%;width:0;border-radius:inherit;
      background:linear-gradient(90deg,#fee500,#ffb020);
      transition:width .1s linear
    }

    /* Tip: 폰 위쪽 */
    .tip{
      display:none;align-items:center;gap:8px;width:100%;margin:0 0 10px;
      padding:10px 10px 10px 12px;border-radius:10px;background:var(--tip);color:#fff;
      font-size:11px;font-weight:700;letter-spacing:-.02em;line-height:1.35;text-align:left;
      box-shadow:0 8px 18px rgba(20,40,70,.18)
    }
    .step.is-active .tip{display:flex}
    .tip[hidden]{display:none!important}
    .tip b{color:#ffd76a;margin-right:3px}
    .tip button{
      margin-left:auto;border:0;border-radius:7px;padding:5px 8px;cursor:pointer;
      background:rgba(255,255,255,.14);color:#fff;font:inherit;font-size:11px;font-weight:700;flex:0 0 auto
    }

    /* phone chrome */
    .status{height:24px;padding:0 11px;display:flex;align-items:center;justify-content:space-between;font-size:9px;font-weight:800}
    .status-right{display:flex;align-items:center;gap:4px}
    .bars{display:flex;align-items:flex-end;gap:1px}
    .bars i{display:block;width:2px;background:#111;border-radius:2px}
    .bars i:nth-child(1){height:3px}.bars i:nth-child(2){height:5px}.bars i:nth-child(3){height:7px}.bars i:nth-child(4){height:9px}
    .battery{width:15px;height:8px;border:1.2px solid #222;border-radius:2px;position:relative}
    .battery:after{content:"";position:absolute;right:-3px;top:2px;width:2px;height:3px;background:#222;border-radius:0 1px 1px 0}
    .battery:before{content:"";position:absolute;left:1px;top:1px;width:9px;height:4px;background:#222;border-radius:1px}

    .icon{display:block;width:22px;height:22px;flex:0 0 auto;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .icon.nav{width:20px;height:20px;stroke-width:1.9}
    .icon.menu{width:28px;height:28px;stroke-width:1.7;color:#191919}
    .icon.menu .letter{fill:currentColor;stroke:none}
    .icon.id-badge{width:28px;height:28px}

    .home-head{padding:8px 12px 10px}
    .identity-row{display:flex;align-items:center;justify-content:space-between}
    .identity{display:flex;align-items:center;gap:8px}
    .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,#a9c4ba,#ece5d2);position:relative;overflow:hidden}
    .avatar:before{content:"";position:absolute;width:9px;height:9px;border-radius:50%;background:#fff9;left:9px;top:5px}
    .avatar:after{content:"";position:absolute;width:17px;height:9px;border-radius:10px 10px 4px 4px;background:#fff9;left:5px;top:15px}
    .name{font-size:17px;font-weight:900}
    .head-actions{display:flex;align-items:center;gap:12px;color:#191919}
    .hot{position:relative;display:inline-flex;align-items:center;justify-content:center;line-height:0}
    .confirm{
      position:relative;display:inline-block;padding:4px 8px;border-radius:8px;
      transition:background .3s,color .3s,box-shadow .3s
    }
    .confirm.pulse{animation:confirm-pop .55s var(--ease)}

    .tabs{display:flex;gap:6px;margin-top:11px}
    .tab{padding:8px 14px;border:1px solid #ddd;border-radius:18px;font-size:11px;font-weight:800}
    .tab.active{background:#191919;color:#fff;border-color:#191919}
    .ad{margin:3px 12px 12px;height:50px;border-radius:12px;background:#f2f2f2;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;color:#8a8a8a}
    .ad-copy{font-size:8px;line-height:1.45}.ad-image{width:68px;height:38px;border-radius:5px;background:linear-gradient(145deg,#666,#ddd)}
    .section-label{padding:8px 12px 5px;font-size:10px;color:#888}
    .profile-edit,.friend-item{display:flex;align-items:center;gap:10px;padding:8px 12px}
    .profile-edit{border-bottom:1px solid #eee}
    .small-avatar{width:36px;height:36px;border-radius:14px;background:#eaeaea;position:relative;flex:0 0 auto}
    .small-avatar:before{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:#c9c9c9;left:13px;top:7px}
    .small-avatar:after{content:"";position:absolute;width:18px;height:9px;border-radius:10px 10px 4px 4px;background:#c9c9c9;left:9px;top:20px}
    .row-title{font-size:11px;font-weight:800}.row-sub{font-size:8px;color:#888;margin-top:2px}
    .chev{margin-left:auto;font-size:20px;color:#999}
    .sort-row{display:flex;justify-content:space-between;padding:8px 12px 2px;font-size:9px;color:#777}
    .ghost{height:1px;background:#f3f3f3;margin:5px 12px}

    .bottom-nav{position:absolute;left:0;right:0;bottom:0;height:52px;border-top:1px solid #eee;background:#fafafa;display:grid;grid-template-columns:repeat(5,1fr)}
    .nav{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#a3a3a8;font-size:7px;font-weight:600}
    .nav.active{color:#191919;font-weight:800}

    .dim{position:absolute;inset:0;background:rgba(0,0,0,.66)}
    .add-panel{
      position:absolute;left:0;right:0;top:24px;background:#fff;padding:14px 10px 16px;
      border-radius:0 0 13px 13px;box-shadow:0 14px 28px rgba(0,0,0,.14)
    }
    .add-head{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:900;margin-bottom:18px;padding:0 4px}
    .back{width:11px;height:11px;border-left:2px solid #111;border-bottom:2px solid #111;transform:rotate(45deg)}
    .add-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center;padding:0 2px}
    .add-item{position:relative;display:flex;flex-direction:column;align-items:center}
    .add-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    .add-name{font-size:8.5px;line-height:1.25;font-weight:600;letter-spacing:-.02em;color:#222}

    .id-page{padding:13px 12px}
    .id-top{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:900;margin-bottom:35px}
    .confirm{margin-left:auto;color:#bbb;font-size:12px;font-weight:800}
    .confirm.on{color:#1a73e8;animation:confirm-pop .5s var(--ease)}
    .input-label{font-size:13px;color:#9a9a9a;margin-bottom:8px}
    .fake-input{
      height:39px;border-bottom:1px solid #777;display:flex;align-items:center;
      font-size:14px;font-weight:800;gap:1px;border-radius:6px
    }
    .caret{width:2px;height:20px;background:#2a8bf2;margin-left:1px;animation:blink 1s step-end infinite}
    .count{text-align:right;font-size:11px;color:#999;margin-top:8px}
    .keyboard{position:absolute;left:0;right:0;bottom:0;height:44%;background:#111;padding:8px 7px}
    .tool-row{display:flex;justify-content:space-around;color:#fff;margin-bottom:8px}
    .tool{width:27px;height:27px;border-radius:50%;background:#29292c;display:grid;place-items:center;font-size:11px}
    .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .key{height:42px;border-radius:6px;background:#3b3b3f;color:#fff;display:grid;place-items:center;font-size:16px}
    .key.press{background:#5a5a60}
    .key.action{background:#171719;color:#7aa5ff}

    @keyframes blink{50%{opacity:0}}
    @keyframes confirm-pop{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}

    @media(max-width:800px){
      .guide-tabs{
        display:flex;justify-content:center;gap:10px;margin-top:20px
      }
      .steps{display:block;margin-top:16px}
      .step{padding:0;border-radius:0;background:transparent!important}
      .step:not(.is-active){display:none!important}
      .step.is-active{display:block;opacity:1}
      .step.is-dim{opacity:1}
      .step-no{display:none}
      .phone-stage{width:min(100%,270px)}
      .step-text{font-size:16px;margin-top:12px}
      .reveal{transition:none}
      .kakao-id{box-shadow:none}
      .aim.on{box-shadow:none}
      .veil{display:none}
      .caret{animation:none}
    }
    @media(max-width:480px){
      body{padding-left:14px;padding-right:14px}
      .lead br.desktop-only{display:none}
      .guide{margin-top:48px;padding-top:36px}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition:none!important}
      .reveal{opacity:1;transform:none}
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="brand reveal">HERITAGE</p>
    <h1 class="hero-title reveal d1">상상하시는 모든 디자인의 귀금속을 연구합니다.</h1>
    <div class="divider reveal d1"></div>
    <p class="lead reveal d2">
      모든 문의는 <strong>카카오톡에서 1:1 맞춤 상담</strong> 해드리고 있습니다.
    </p>
    <div class="kakao-box reveal d3">
      <div class="kakao-label">KAKAO ID</div>
      <div class="kakao-id">ADD68</div>
    </div>

    <section class="guide reveal d3">
      <h2>카카오톡 친구 추가 방법</h2>
      <p class="guide-sub">아래 순서대로 진행해 주세요.</p>
      <div class="global-meter" aria-hidden="true"><i id="globalMeter"></i></div>
      <div class="guide-tabs" id="guideTabs" aria-label="단계 선택">
        <button type="button" data-go="0" class="is-active" aria-label="1단계">1</button>
        <button type="button" data-go="1" aria-label="2단계">2</button>
        <button type="button" data-go="2" aria-label="3단계">3</button>
      </div>
      <div class="steps" id="steps"></div>
    </section>
  </main>

  <script>
    (() => {
      const svg = (cls, body) =>
        `<svg class="icon ${cls || ""}" viewBox="0 0 24 24" aria-hidden="true">${body}</svg>`;

      const iconSearch = svg("", `<circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>`);
      const iconPersonAdd = svg("", `
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <line x1="19" x2="19" y1="8" y2="14"></line>
        <line x1="22" x2="16" y1="11" y2="11"></line>`);
      const iconGear = svg("", `
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
        <circle cx="12" cy="12" r="3"></circle>`);
      const iconUsers = svg("nav", `
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>`);
      const iconChat = svg("nav", `<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"></path>`);
      const iconOpenChat = svg("nav", `
        <path d="M14 9a2 2 0 0 1-2 2H6l-4 4V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2z"></path>
        <path d="M18 9h2a2 2 0 0 1 2 2v11l-4-4h-6a2 2 0 0 1-2-2v-1"></path>`);
      const iconShop = svg("nav", `
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
        <path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path>`);
      const iconMore = svg("nav", `
        <circle cx="5" cy="12" r="1.35" fill="currentColor" stroke="none"></circle>
        <circle cx="12" cy="12" r="1.35" fill="currentColor" stroke="none"></circle>
        <circle cx="19" cy="12" r="1.35" fill="currentColor" stroke="none"></circle>`);
      const iconQR = `<svg class="icon menu" viewBox="0 0 24 24" aria-hidden="true">
        <rect width="5" height="5" x="3" y="3" rx="1"></rect>
        <rect width="5" height="5" x="16" y="3" rx="1"></rect>
        <rect width="5" height="5" x="3" y="16" rx="1"></rect>
        <path d="M21 16h-3a2 2 0 0 0-2 2v3"></path><path d="M21 21v.01"></path>
        <path d="M12 7v3a2 2 0 0 1-2 2H7"></path><path d="M3 12h.01"></path>
        <path d="M12 3h.01"></path><path d="M12 16v.01"></path>
        <path d="M16 12h1"></path><path d="M21 12v.01"></path><path d="M12 21v-1"></path>
      </svg>`;
      const iconContact = `<svg class="icon menu" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M16 2v2"></path><path d="M7 22v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"></path>
        <path d="M8 2v2"></path><circle cx="12" cy="11" r="3"></circle>
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
      </svg>`;
      const iconID = `<svg class="icon menu id-badge" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9"></circle>
        <rect class="letter" x="7.6" y="8.4" width="1.35" height="7.2" rx=".65"></rect>
        <path class="letter" d="M10.7 8.4h2.05c1.95 0 3.15 1.2 3.15 3.6s-1.2 3.6-3.15 3.6H10.7V8.4zm1.35 1.3v4.6h.65c1.05 0 1.7-.65 1.7-2.3s-.65-2.3-1.7-2.3h-.65z"></path>
      </svg>`;
      const iconRecommend = `<svg class="icon menu" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <line x1="19" x2="19" y1="8" y2="14"></line>
        <line x1="22" x2="16" y1="11" y2="11"></line>
      </svg>`;

      const status = `
        <div class="status"><span>7:57</span>
          <div class="status-right"><div class="bars"><i></i><i></i><i></i><i></i></div><div class="battery"></div></div>
        </div>`;
      const bottomNav = `
        <div class="bottom-nav">
          <div class="nav active">${iconUsers}<span>친구</span></div>
          <div class="nav">${iconChat}<span>채팅</span></div>
          <div class="nav">${iconOpenChat}<span>오픈채팅</span></div>
          <div class="nav">${iconShop}<span>쇼핑</span></div>
          <div class="nav">${iconMore}<span>더보기</span></div>
        </div>`;

      const data = [
        {
          text: "카카오톡에 접속한 후<br>친구 화면 상단의 사람+ 아이콘을 눌러주세요.",
          tip: "사람+ 아이콘을 누르세요.",
          duration: 4200,
          target: "person",
          hole: 26,
          screen: `
            ${status}
            <div class="home-head">
              <div class="identity-row">
                <div class="identity"><div class="avatar"></div><div class="name">헤리티지</div></div>
                <div class="head-actions">
                  ${iconSearch}
                  <div class="hot"><span class="hit person" data-target="person">${iconPersonAdd}<span class="aim" style="--aim:34px" aria-hidden="true"></span></span></div>
                  ${iconGear}
                </div>
              </div>
              <div class="tabs"><div class="tab active">친구</div><div class="tab">소식</div></div>
            </div>
            <div class="ad"><div class="ad-copy">업무 공간을 위한<br><b>맞춤 제작 안내</b></div><div class="ad-image"></div></div>
            <div class="section-label">업데이트 프로필</div>
            <div class="profile-edit"><div class="small-avatar"></div><div><div class="row-title">내 프로필을 편집해 보세요.</div></div><div class="chev">›</div></div>
            <div class="section-label">특별한 친구</div>
            <div class="friend-item"><div class="small-avatar" style="background:#b9e3ef"></div><div><div class="row-title">헤리티지</div><div class="row-sub">카카오톡 상담 계정</div></div></div>
            <div class="ghost"></div>
            <div class="sort-row"><span>친구</span><b>가나다순 · 업데이트순</b></div>
            <div class="friend-item"><div class="small-avatar" style="background:#ffe6a9"></div><div class="row-title">추천친구</div><div class="chev">›</div></div>
            ${bottomNav}`
        },
        {
          text: "친구 추가 화면에서<br>카카오톡 ID를 눌러주세요.",
          tip: "카카오톡 ID를 선택하세요.",
          duration: 4600,
          target: "kakao-id",
          hole: 30,
          screen: `
            ${status}
            <div class="home-head">
              <div class="identity-row">
                <div class="identity"><div class="avatar"></div><div class="name">헤리티지</div></div>
                <div class="head-actions">${iconSearch}${iconPersonAdd}${iconGear}</div>
              </div>
            </div>
            <div class="ad"><div class="ad-copy">업무 공간을 위한<br><b>맞춤 제작 안내</b></div><div class="ad-image"></div></div>
            <div class="section-label">업데이트 프로필</div>
            <div class="profile-edit"><div class="small-avatar"></div><div class="row-title">내 프로필을 편집해 보세요.</div><div class="chev">›</div></div>
            ${bottomNav}
            <div class="dim"></div>
            <div class="add-panel">
              <div class="add-head"><div class="back"></div><span>친구 추가</span></div>
              <div class="add-grid">
                <div class="add-item"><div class="add-icon">${iconQR}</div><div class="add-name">QR 코드</div></div>
                <div class="add-item"><div class="add-icon">${iconContact}</div><div class="add-name">연락처</div></div>
                <div class="add-item"><div class="add-icon"><span class="hit" data-target="kakao-id">${iconID}<span class="aim" style="--aim:40px" aria-hidden="true"></span></span></div><div class="add-name">카카오톡 ID</div></div>
                <div class="add-item"><div class="add-icon">${iconRecommend}</div><div class="add-name">추천친구</div></div>
              </div>
            </div>`
        },
        {
          text: "ADD68을 입력한 후<br>확인을 눌러 친구 추가해 주세요.",
          tip: "ADD68을 입력하세요.",
          tip2: "확인을 누르세요.",
          duration: 5800,
          mode: "input",
          screen: `
            ${status}
            <div class="id-page">
              <div class="id-top">
                <div class="back"></div><span>카카오톡 ID로 추가</span>
                <span class="confirm" data-confirm data-target="confirm">확인</span>
              </div>
              <div class="input-label">친구 카카오톡 ID</div>
              <div class="fake-input" data-target="input"><span class="typed" data-typed></span><span class="caret"></span></div>
              <div class="count"><span data-count>0</span>/20</div>
            </div>
            <div class="keyboard">
              <div class="tool-row"><div class="tool">✦</div><div class="tool">☺</div><div class="tool">A</div><div class="tool">⚙</div><div class="tool">•••</div></div>
              <div class="keys">
                <div class="key" data-k="A">A</div><div class="key" data-k="D">D</div><div class="key" data-k="D2">D</div><div class="key">⌫</div>
                <div class="key" data-k="6">6</div><div class="key" data-k="8">8</div><div class="key">ㄷㅌ</div><div class="key action">완료</div>
                <div class="key">ㅂㅍ</div><div class="key">ㅅㅎ</div><div class="key">ㅈㅊ</div><div class="key">.,?!</div>
              </div>
            </div>`
        }
      ];

      const root = document.getElementById("steps");
      const globalMeter = document.getElementById("globalMeter");
      const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

      root.innerHTML = data.map((item, i) => `
        <article class="step" data-step="${i}" role="button" tabindex="0" aria-label="단계 ${i + 1}">
          <div class="step-no">${i + 1}</div>
          <div class="phone-stage">
            <div class="tip" data-tip role="status">
              <span><b>Tip!</b><span data-tip-text></span></span>
              <button type="button" data-tip-close>닫기</button>
            </div>
            <div class="phone-frame">
              <div class="camera">
                <div class="phone">
                  <div class="screen">${item.screen}</div>
                  <div class="fx">
                    <div class="veil"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="step-meter"><i></i></div>
          </div>
          <p class="step-text">${item.text}</p>
        </article>
      `).join("");

      let index = 0;
      let autoTimer = null;
      let meterTimer = null;
      let tipTimer = null;
      let typingTimer = null;
      let keyTimers = [];
      const isMobile = matchMedia("(max-width:800px)").matches;

      const cards = () => [...root.querySelectorAll(".step")];

      function clearFx(card) {
        if (tipTimer) clearTimeout(tipTimer);
        if (typingTimer) clearTimeout(typingTimer);
        keyTimers.forEach(clearTimeout);
        keyTimers = [];
        if (!card) return;
        card.querySelectorAll(".aim").forEach(el => el.classList.remove("on"));
        card.querySelectorAll(".fake-input").forEach(el => el.classList.remove("lit"));
        card.querySelectorAll(".confirm").forEach(el => el.classList.remove("on", "pulse", "lit"));
        const tip = card.querySelector("[data-tip]");
        const veil = card.querySelector(".veil");
        if (tip) {
          tip.hidden = false;
          const t = tip.querySelector("[data-tip-text]");
          if (t) t.textContent = "";
        }
        if (veil) {
          veil.classList.remove("on");
          veil.style.removeProperty("--vx");
          veil.style.removeProperty("--vy");
          veil.style.removeProperty("--hole");
        }
        const typed = card.querySelector("[data-typed]");
        const count = card.querySelector("[data-count]");
        if (typed) typed.textContent = "";
        if (count) count.textContent = "0";
        card.querySelectorAll(".key.press").forEach(k => k.classList.remove("press"));
        const meter = card.querySelector(".step-meter > i");
        if (meter) meter.style.width = "0%";
      }

      function pointInFx(card, el) {
        const fx = card.querySelector(".fx");
        if (!fx || !el) return null;
        const fr = fx.getBoundingClientRect();
        const tr = el.getBoundingClientRect();
        if (!fr.width || !fr.height) return null;
        return {
          x: ((tr.left + tr.width / 2) - fr.left) / fr.width * 100,
          y: ((tr.top + tr.height / 2) - fr.top) / fr.height * 100
        };
      }

      function syncVeil(card, target, hole) {
        if (isMobile) return null;
        const veil = card.querySelector(".veil");
        const pos = pointInFx(card, target);
        if (!veil || !pos) return pos;
        veil.style.setProperty("--vx", `${pos.x}%`);
        veil.style.setProperty("--vy", `${pos.y}%`);
        veil.style.setProperty("--hole", `${hole || 34}px`);
        veil.classList.add("on");
        return pos;
      }

      function showTip(card, text) {
        const tip = card.querySelector("[data-tip]");
        const tipText = card.querySelector("[data-tip-text]");
        if (!tip || !tipText || !text) return;
        tip.hidden = false;
        tipText.textContent = text;
      }

      /* 1·2단계: hit 중심에 원·veil 동시 맞춤 */
      function runIconStep(card, step) {
        const target = card.querySelector(`[data-target="${step.target}"]`);
        const aim = target && target.querySelector(".aim");
        if (!target || !aim) return;
        aim.classList.add("on");
        syncVeil(card, target, step.hole);
        showTip(card, step.tip);
      }

      /* 3단계: 입력바 네모 강조 → 입력 후 확인 */
      function runInputStep(card, step) {
        const input = card.querySelector('[data-target="input"]');
        const confirm = card.querySelector("[data-confirm]");
        const typed = card.querySelector("[data-typed]");
        const count = card.querySelector("[data-count]");
        const veil = card.querySelector(".veil");
        const order = ["A", "D", "D2", "6", "8"];
        const text = "ADD68";
        const gap = isMobile ? 220 : 260;

        if (veil) veil.classList.remove("on");

        const focusInput = () => {
          if (!input) return;
          input.classList.add("lit");
          if (confirm) confirm.classList.remove("lit", "on", "pulse");
          showTip(card, step.tip);
        };

        const focusConfirm = () => {
          if (!confirm) return;
          if (input) input.classList.remove("lit");
          confirm.classList.add("on", "lit", "pulse");
          showTip(card, step.tip2 || "확인을 누르세요.");
        };

        focusInput();
        if (!typed) return;

        if (reduce) {
          typed.textContent = text;
          if (count) count.textContent = String(text.length);
          focusConfirm();
          return;
        }

        let i = 0;
        const tick = () => {
          if (i >= text.length) {
            focusConfirm();
            return;
          }
          typed.textContent += text[i];
          if (count) count.textContent = String(i + 1);
          const key = card.querySelector(`.key[data-k="${order[i]}"]`);
          if (key) {
            key.classList.add("press");
            keyTimers.push(setTimeout(() => key.classList.remove("press"), 120));
          }
          i += 1;
          typingTimer = setTimeout(tick, gap);
        };
        typingTimer = setTimeout(tick, isMobile ? 320 : 450);
      }

      function startAuto() {
        if (autoTimer) clearTimeout(autoTimer);
        if (meterTimer) clearInterval(meterTimer);
        const dur = data[index].duration;
        const started = performance.now();
        globalMeter.style.width = "0%";
        const local = cards()[index]?.querySelector(".step-meter > i");
        if (local) local.style.width = "0%";

        const tickMeter = () => {
          const t = Math.min(1, (performance.now() - started) / dur);
          const w = `${t * 100}%`;
          globalMeter.style.width = w;
          if (local) local.style.width = w;
          if (t >= 1 && meterTimer) clearInterval(meterTimer);
        };
        meterTimer = setInterval(tickMeter, isMobile ? 80 : 50);
        tickMeter();
        autoTimer = setTimeout(() => go(index + 1), dur);
      }

      const tabs = document.getElementById("guideTabs");

      function syncTabs() {
        if (!tabs) return;
        tabs.querySelectorAll("[data-go]").forEach((btn) => {
          const on = Number(btn.dataset.go) === index;
          btn.classList.toggle("is-active", on);
          btn.setAttribute("aria-current", on ? "step" : "false");
        });
      }

      function go(n) {
        if (autoTimer) clearTimeout(autoTimer);
        if (meterTimer) clearInterval(meterTimer);
        cards().forEach(c => clearFx(c));
        index = ((n % data.length) + data.length) % data.length;
        const step = data[index];

        cards().forEach((card, i) => {
          const on = i === index;
          card.classList.toggle("is-active", on);
          card.classList.toggle("is-dim", !on);
          card.setAttribute("aria-current", on ? "step" : "false");
        });
        syncTabs();

        const card = cards()[index];
        const run = () => {
          if (step.mode === "input") runInputStep(card, step);
          else runIconStep(card, step);
          startAuto();
        };
        if (isMobile) requestAnimationFrame(() => requestAnimationFrame(run));
        else run();
      }

      if (tabs) {
        tabs.addEventListener("click", (e) => {
          const btn = e.target.closest("[data-go]");
          if (!btn) return;
          go(Number(btn.dataset.go));
        });
      }

      root.addEventListener("click", (e) => {
        if (e.target.closest("[data-tip-close]")) {
          const tip = e.target.closest("[data-tip]");
          if (tip) tip.hidden = true;
          e.stopPropagation();
          return;
        }
        const card = e.target.closest("[data-step]");
        if (!card) return;
        go(Number(card.dataset.step));
      });
      root.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const card = e.target.closest("[data-step]");
        if (!card) return;
        e.preventDefault();
        go(Number(card.dataset.step));
      });

      document.querySelectorAll(".reveal").forEach((el, i) => {
        setTimeout(() => el.classList.add("on"), 40 + i * 70);
      });

      go(0);

      window.addEventListener("load", async () => {
        try {
          if ("serviceWorker" in navigator) {
            /* pwa: keep service worker */
          }
          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.map(name => caches.delete(name)));
          }
        } catch (_) {}
      });
    })();
  </script>
</body>
