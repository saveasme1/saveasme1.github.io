<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="guide-build" content="20260722-mp20">
  <title>헤리티지 · 마이페이지</title>
  <meta name="theme-color" content="#161513">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="헤리티지">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css">
  <link rel="stylesheet" href="handmade-reviews.css?v=20260722-mp20">
  <link rel="stylesheet" href="site-nav.css?v=20260722-mp20">
  <link rel="stylesheet" href="mypage.css?v=20260722-mp20">
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>
  <main class="mp-shell">
    <header class="mp-head">
      <h1>내가 작성한 글</h1>
    </header>
    <div class="mp-toolbar">
      <nav class="mp-tabs" id="mpTabs" aria-label="게시판 탭"></nav>
      <p class="mp-status" id="mpStatus" aria-live="polite">불러오는 중…</p>
    </div>
    <section class="mp-list" id="mpList" aria-label="내 게시글 목록"></section>
    <nav class="mp-pager" id="mpPager" aria-label="페이지"></nav>
  </main>

  <dialog class="review-dialog write-dialog" id="mpEditDialog">
    <form id="mpEditForm">
      <input type="hidden" name="id">
      <h2>리얼후기 수정</h2>
      <label>제목<input name="title" minlength="2" maxlength="160" required></label>
      <label>내용<textarea name="body" minlength="2" maxlength="20000" required></textarea></label>
      <label>대표 이미지 (선택)<input name="cover" type="file" accept="image/jpeg,image/png,image/webp"></label>
      <label>추가 이미지 (선택, 최대 8장)<input name="images" type="file" accept="image/jpeg,image/png,image/webp" multiple></label>
      <p class="review-image-help">이미지를 바꾸지 않으면 기존 이미지가 유지됩니다.</p>
      <p class="review-dialog-status" id="mpEditStatus" aria-live="polite"></p>
      <div class="review-dialog-actions">
        <button type="button" id="mpEditCancel">취소</button>
        <button class="primary" type="submit">수정 저장</button>
      </div>
    </form>
  </dialog>

  <script src="time-kr.js?v=20260722-mp20"></script>
  <script src="html-editor.js?v=20260722-mp20"></script>
  <script src="mypage.js?v=20260722-mp20"></script>
  <script src="site-nav.js?v=20260722-mp20"></script>
  <script src="pwa-register.js"></script>
</body>
</html>
