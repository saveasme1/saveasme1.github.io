<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#161513">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="헤리티지">
  <title>헤리티지 · 사진으로 찾기</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="search.css?v=20260723-ai2">
</head>
<body>
  <header class="js-top">
    <a class="js-back" href="./landing.html">← 돌아가기</a>
    <strong>사진으로 찾기</strong>
    <span class="js-badge">BETA</span>
  </header>

  <main class="js-main">
    <section class="js-hero">
      <h1>주얼리 AI 검색</h1>
      <p>사진 업로드·카메라로 비슷한 작품을 찾습니다. 이 기능은 현재 베타 테스트 기능으로 정확하지 않을 수 있습니다.</p>
    </section>

    <section class="js-panel" aria-label="검색">
      <div class="js-tabs" role="tablist">
        <button type="button" class="is-active" data-tab="photo">사진</button>
        <button type="button" data-tab="camera">카메라</button>
      </div>

      <div class="js-tabpane is-active" id="pane-photo">
        <label class="js-drop" id="photoDrop">
          <input id="fileInput" type="file" accept="image/*" hidden>
          <strong>사진 선택 / 업로드</strong>
          <span>JPG·PNG · 최대 10MB</span>
        </label>
        <div class="js-preview" id="photoPreview" hidden></div>
        <div class="js-row">
          <button type="button" class="js-btn" id="photoClear" hidden>사진 지우기</button>
          <button type="button" class="js-btn primary" id="photoSearch" disabled>검색</button>
        </div>
      </div>

      <div class="js-tabpane" id="pane-camera">
        <video id="cameraVideo" playsinline muted></video>
        <div class="js-preview" id="cameraPreview" hidden></div>
        <div class="js-row">
          <button type="button" class="js-btn" id="cameraStart">카메라 켜기</button>
          <button type="button" class="js-btn" id="cameraCapture" disabled>촬영</button>
          <button type="button" class="js-btn primary" id="cameraSearch" disabled>촬영 후 검색</button>
        </div>
        <canvas id="cameraCanvas" hidden></canvas>
      </div>

      <div class="js-filters" id="filters" hidden>
        <label>브랜드
          <select id="filterBrand"><option value="ALL">ALL</option></select>
        </label>
        <label>카테고리
          <select id="filterCategory"><option value="ALL">ALL</option></select>
        </label>
        <label>재질
          <select id="filterMaterial"><option value="ALL">ALL</option></select>
        </label>
      </div>
    </section>

    <p class="js-status" id="status" aria-live="polite">준비됨</p>
    <section class="js-results" id="results" aria-label="검색 결과"></section>
    <section class="js-related" id="related" hidden aria-label="관련 상품">
      <h2>관련 상품</h2>
      <div class="js-grid" id="relatedGrid"></div>
    </section>
  </main>

  <script src="search.js?v=20260723-ai2"></script>
  <script src="pwa-register.js"></script>
</body>
</html>
